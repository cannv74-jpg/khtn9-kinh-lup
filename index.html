                { q: "Trục chính của thấu kính đi qua", a: ["O và F.", "mép thấu kính.", "điểm bất kì.", "vô cực."], c: 0, explain: "Trục chính nối quang tâm và các tiêu điểm." },
                { q: "Kính cận là loại thấu kính nào?", a: ["Thấu kính hội tụ.", "Thấu kính phân kì.", "Gương phẳng.", "Lăng kính."], c: 1, explain: "Kính cận dùng thấu kính phân kì để khắc phục tật cận thị." },
                { q: "Ảnh ảo qua thấu kính hội tụ luôn có tính chất", a: ["nhỏ hơn vật.", "lớn hơn vật.", "ngược chiều.", "bằng vật."], c: 1, explain: "Ảnh ảo TKHT là ảnh phóng đại (kính lúp)." }
            ],
            part2: [
                { lead: "Xét thấu kính hội tụ có $f = 12cm$. Vật AB đặt cách kính $d = 8cm$. Chọn Đúng/Sai.", options: [{ text: "Ảnh thu được là ảnh ảo cùng chiều vật.", type: true }, { text: "Ảnh thu được nhỏ hơn vật thật.", type: false }, { text: "Ảnh nằm cùng phía với vật so với kính.", type: true }, { text: "Dời vật ra xa 10cm nữa ảnh thành thật.", type: true }], explain: "d < f tạo ảnh ảo phóng đại. Dời xa -> d=18 > f ảnh thành thật." },
                { lead: "Về thấu kính phân kì (TKPK) trong thí nghiệm.", options: [{ text: "Rìa thấu kính dày hơn phần giữa.", type: true }, { text: "Có thể tạo ra ảnh thật từ vật thật.", type: false }, { text: "Tia sáng song song trục chính loe rộng ra.", type: true }, { text: "Đường kéo dài tia ló song song đi qua F.", type: true }], explain: "TKPK luôn cho ảnh ảo đối với vật thật và làm phân kì chùm sáng." },
                { lead: "Đường truyền các tia sáng đặc biệt qua thấu kính.", options: [{ text: "Tia qua O truyền thẳng.", type: true }, { text: "Tia song song trục TKHT qua F'.", type: true }, { text: "Tia qua F của TKHT cho tia ló song song trục.", type: true }, { text: "Mọi tia tới qua thấu kính đều hội tụ.", type: false }], explain: "TKPK làm phân kì chùm sáng, không hội tụ." },
                { lead: "Sử dụng thấu kính trong đời sống thực tế.", options: [{ text: "Kính lúp dùng thấu kính phân kì.", type: false }, { text: "Mắt người coi như một thấu kính hội tụ.", type: true }, { text: "Máy ảnh dùng thấu kính hội tụ làm vật kính.", type: true }, { text: "Kính cận làm vật nhỏ đi khi nhìn qua nó.", type: true }], explain: "Kính lúp dùng TKHT. Kính cận dùng TKPK làm ảnh nhỏ đi." }
            ],
            part3: [
                { q: "Kính lúp ghi 4X. Tính tiêu cự của kính lúp này (cm).", ans: "6,25", explain: "f = 25/4 = 6,25 cm." },
                { q: "TKHT f=20cm. Vật đặt tại d=40cm. Ảnh cách kính bao nhiêu cm?", ans: "40", explain: "d=2f => d'=2f=40 cm." },
                { q: "TKPK f=10cm. Vật đặt tại d=10cm. Ảnh ảo cách kính bao nhiêu cm?", ans: "5", explain: "Công thức: d' = (d.f)/(d+f) = (10.10)/(20) = 5 cm." },
                { q: "Kính lúp có tiêu cự 5 cm thì số bội giác G bằng mấy?", ans: "5", explain: "G = 25/5 = 5." },
                { q: "Vật cách TKHT 15cm cho ảnh thật cách kính 30cm. Tiêu cự kính là mấy cm?", ans: "10", explain: "f = (15.30)/(15+30) = 10 cm." },
                { q: "Ghi số tiêu điểm chính của một thấu kính mỏng thông thường.", ans: "2", explain: "Có 2 tiêu điểm F và F'." },
                { q: "Thấu kính f=15cm. Tính khoảng cách FF' (cm).", ans: "30", explain: "FF' = 2f = 30 cm." },
                { q: "Nhận định đúng: 1. TKHT rìa mỏng; 2. TKPK rìa mỏng; 3. Qua O truyền thẳng; 4. Ảnh thật TKHT cùng chiều vật. (Ghi dãy tăng dần)", ans: "13", explain: "1, 3 Đúng. 2 Sai (rìa dày), 4 Sai (ngược chiều)." }
            ]
        };

        const shuffle = (a) => {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };

        let currentQuestions = [], userAnswers = [], currentIndex = 0, timer = null, studentData = {};

        // ATTACH TO WINDOW
        window.startGame = () => {
            const name = document.getElementById('input-name').value.trim();
            if(!name) { alert("Vui lòng nhập tên!"); return; }
            studentData = { name, sbd: document.getElementById('input-sbd').value || "000", class: document.getElementById('input-class').value || "9A", school: document.getElementById('input-school').value || "THCS" };

            // Trộn ngân hàng và bốc 20 câu. Quan trọng: Trộn phương án MCQ để phân bổ đều A,B,C,D
            const p1 = shuffle([...BANK.part1]).slice(0, 12).map(q => {
                let options = q.a.map((txt, i) => ({ txt, isCorrect: i === q.c }));
                options = shuffle(options);
                return { q: q.q, a: options.map(o => o.txt), c: options.findIndex(o => o.isCorrect), explain: q.explain, type: 'mc' };
            });
            const p2 = shuffle([...BANK.part2]).slice(0, 4).map(q => ({...q, options: shuffle([...q.options]), type: 'tf'}));
            const p3 = shuffle([...BANK.part3]).slice(0, 4).map(q => ({...q, type: 'sa'}));
            
            currentQuestions = [...p1, ...p2, ...p3];
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;

            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('screen-game').classList.add('flex');
            document.getElementById('student-info-display').innerText = `${studentData.name.toUpperCase()} | SBD: ${studentData.sbd}`;
            window.showQuestion();
        };

        window.showQuestion = () => {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('question-container');
            let displayNum = 0, partText = "", timeLimit = 90;

            if (q.type === 'mc') { displayNum = currentIndex + 1; partText = "Phần I. Đa lựa chọn (0.25đ)"; }
            else if (q.type === 'tf') { displayNum = currentIndex - 11; partText = "Phần II. Đúng/Sai (Tối đa 0.5đ)"; timeLimit = 120; }
            else { displayNum = currentIndex - 15; partText = "Phần III. Trả lời ngắn (0,5đ)"; timeLimit = 120; }

            document.getElementById('q-progress').innerText = currentIndex + 1;
            
            let html = `<div class="mb-2 text-[7pt] font-black uppercase text-blue-300 tracking-[0.2em]">${partText}</div>
                        <div class="mb-6"><span class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg">CÂU ${displayNum}</span></div>`;

            if (q.type === 'mc') {
                html += `<div class="text-2xl font-bold mb-10 text-slate-800 leading-snug">${q.q}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-5">`;
                q.a.forEach((opt, i) => {
                    const sel = userAnswers[currentIndex] === i ? 'option-selected' : '';
                    html += `<div onclick="window.setMC(${i})" class="option-card p-6 border-2 flex items-center gap-5 ${sel}">
                                <span class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center font-black text-slate-400 border">${String.fromCharCode(65+i)}</span>
                                <span class="text-lg font-medium">${opt}</span>
                             </div>`;
                });
                html += `</div>`;
            } else if (q.type === 'tf') {
                html += `<div class="text-2xl font-bold mb-8 text-slate-800">${q.lead}</div><div class="space-y-4">`;
                const saved = userAnswers[currentIndex] || [null, null, null, null];
                q.options.forEach((opt, i) => {
                    html += `<div class="flex items-center justify-between p-5 bg-slate-50 rounded-[1.5rem] border-2 border-white shadow-sm hover:bg-slate-100">
                                <span class="text-lg font-medium flex-1 mr-4"><b>${String.fromCharCode(97+i)})</b> ${opt.text}</span>
                                <div class="flex gap-3">
                                    <button onclick="window.setTF(${i}, true)" class="tf-btn ${saved[i]===true?'selected-true':'bg-white text-slate-300'}">Đúng</button>
                                    <button onclick="window.setTF(${i}, false)" class="tf-btn ${saved[i]===false?'selected-false':'bg-white text-slate-300'}">Sai</button>
                                </div>
                             </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="text-2xl font-bold mb-10 text-center text-slate-800 leading-relaxed">${q.q}</div>
                         <div class="flex flex-col items-center">
                            <input type="text" maxlength="5" oninput="window.setSA(this.value)" value="${userAnswers[currentIndex]||''}" class="w-full max-w-sm p-6 border-b-8 border-blue-600 text-center text-7xl font-black focus:border-yellow-400 outline-none bg-transparent" placeholder="...">
                            <p class="mt-8 text-xs font-black text-slate-300 tracking-[0.2em] italic uppercase">Đáp án của bạn (ví dụ: 10 hoặc 1234)</p>
                         </div>`;
            }

            container.innerHTML = html;
            document.getElementById('btn-back').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerHTML = currentIndex === 19 ? 'NỘP BÀI <i class="fas fa-paper-plane ml-2"></i>' : 'TIẾP THEO <i class="fas fa-arrow-right ml-2"></i>';
            
            window.startTimer(timeLimit);
            if (window.MathJax) MathJax.typesetPromise([container]);
        };

        window.startTimer = (sec) => {
            if (timer) clearInterval(timer);
            let time = sec;
            const bar = document.getElementById('timer-bar'), display = document.getElementById('timer-display');
            timer = setInterval(() => {
                display.innerText = `${time}s`;
                bar.style.width = (time/sec)*100 + "%";
                if (time <= 0) { clearInterval(timer); window.nextQuestion(); }
                time--;
            }, 1000);
        };

        window.setMC = (i) => { userAnswers[currentIndex] = i; window.playSound('ping'); window.showQuestion(); };
        window.setTF = (idx, val) => { if(!userAnswers[currentIndex]) userAnswers[currentIndex] = [null,null,null,null]; userAnswers[currentIndex][idx] = val; window.playSound('ping'); window.showQuestion(); };
        window.setSA = (val) => { userAnswers[currentIndex] = val.trim(); };
        window.prevQuestion = () => { if(currentIndex > 0) { currentIndex--; window.showQuestion(); } };
        window.nextQuestion = () => { if(currentIndex < 19) { currentIndex++; window.showQuestion(); } else { window.finishGame(); } };

        window.playSound = (t) => {
            try { const ctx = new AudioContext(), o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(t==='ping'?800:440, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); o.start(); o.stop(ctx.currentTime + 0.3); } catch(e) {}
        };

        window.finishGame = async () => {
            clearInterval(timer);
            const btn = document.getElementById('btn-next');
            btn.disabled = true; btn.innerHTML = `<i class="fas fa-sync fa-spin mr-2"></i> ĐANG GỬI...`;

            let s1=0, s2=0, s3=0;
            currentQuestions.forEach((q, i) => {
                const ans = userAnswers[i];
                if (q.type === 'mc') { if (ans === q.c) s1 += 0.25; }
                else if (q.type === 'tf' && ans) {
                    let c = 0; q.options.forEach((opt, idx) => { if (ans[idx] === opt.type) c++; });
                    s2 += [0, 0.0625, 0.125, 0.25, 0.5][c];
                } else if (q.type === 'sa' && (ans||"").toString() === q.ans) s3 += 0.5;
            });

            const total = parseFloat((s1 + s2 + s3).toFixed(1));
            let r = total >= 6 ? "XUẤT SẮC" : total >= 5 ? "GIỎI" : total >= 4 ? "KHÁ" : total >= 3 ? "ĐẠT" : "CHƯA ĐẠT";

            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('screen-results').classList.add('flex');
            
            document.getElementById('total-score').innerText = `${total.toFixed(1)} / 7.0`;
            document.getElementById('score-p1').innerText = s1.toFixed(2);
            document.getElementById('score-p2').innerText = s2.toFixed(2);
            document.getElementById('score-p3').innerText = s3.toFixed(2);
            document.getElementById('result-rank').innerText = r;

            if (userAuth) {
                const statusBox = document.getElementById('save-status-container');
                statusBox.classList.remove('hidden'); statusBox.classList.add('flex');
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), {
                        hoTen: studentData.name, sbd: studentData.sbd, lop: studentData.class, truong: studentData.school,
                        diemTong: total, xepLoai: r, thoiGianNop: serverTimestamp()
                    });
                    document.getElementById('save-status').innerHTML = "Đã đẩy dữ liệu lên Firestore thành công! ✅";
                    document.getElementById('save-icon').className = "fas fa-check-circle text-emerald-500 animate-bounce";
                } catch (e) { document.getElementById('save-status').innerText = "Lỗi Firestore! ❌"; }
            }
        };

        window.showReview = () => {
            const container = document.getElementById('review-container');
            container.innerHTML = '<h3 class="text-4xl font-black mb-12 text-center text-slate-800 uppercase tracking-tighter">Bảng phân tích bài thi</h3>';
            container.classList.remove('hidden');

            currentQuestions.forEach((q, i) => {
                const ans = userAnswers[i];
                let isCorrect = false;
                if(q.type === 'mc') isCorrect = (ans === q.c);
                else if(q.type === 'sa') isCorrect = ((ans||"").toString() === q.ans);
                else isCorrect = true; // TF is partial, always show blueish/greenish

                let html = `<div class="card p-10 border-l-[16px] ${isCorrect ? 'border-emerald-500' : 'border-rose-500'} mb-10 text-left animate-fade-in">
                    <div class="font-black text-xl mb-6 text-slate-800 leading-snug">Câu ${i+1}: ${q.type === 'tf' ? q.lead : q.q}</div>`;
                
                if(q.type === 'mc') {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">`;
                    q.a.forEach((opt, idx) => {
                        let style = (idx === q.c) ? 'bg-emerald-50 border-emerald-400 font-bold text-emerald-900' : (idx === ans ? 'bg-rose-50 border-rose-400 font-bold text-rose-900' : 'bg-slate-50 border-slate-200 opacity-60');
                        html += `<div class="p-4 border-2 rounded-2xl text-sm ${style}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
                    });
                    html += `</div>`;
                } else if(q.type === 'tf') {
                    html += `<div class="space-y-3 mb-6">`;
                    const uArr = ans || [null,null,null,null];
                    q.options.forEach((opt, idx) => {
                        const isMatch = uArr[idx] === opt.type;
                        html += `<div class="p-3 border rounded-2xl text-[11px] ${isMatch?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'} flex justify-between uppercase font-black">
                                    <span>${String.fromCharCode(97+idx)}. ${opt.text}</span>
                                    <span>Bạn: ${uArr[idx]===null?'_':(uArr[idx]?'Đ':'S')} | Đ.án: ${opt.type?'Đ':'S'}</span>
                                 </div>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="flex gap-4 mb-6"><div class="flex-1 p-6 bg-slate-50 rounded-3xl border-2 border-dashed text-sm uppercase font-black text-slate-400">Bạn nhập: <b class="text-slate-900 text-xl">${ans||'_'}</b></div><div class="flex-1 p-6 bg-emerald-50 rounded-3xl border-2 border-emerald-200 text-sm uppercase font-black text-emerald-700">Đ.án chuẩn: <b class="text-xl">${q.ans}</b></div></div>`;
                }
                html += `<div class="p-8 bg-blue-50/50 text-blue-900 text-sm rounded-[2rem] border-2 border-blue-100/50 leading-relaxed font-bold italic shadow-inner">
                            <div class="text-[9px] uppercase tracking-widest text-blue-300 mb-2">Lời giải khoa học</div>
                            ${q.explain}
                         </div></div>`;
                container.innerHTML += html;
            });
            setTimeout(() => { container.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 150);
            if (window.MathJax) MathJax.typesetPromise([container]);
        };

        window.restartGame = () => location.reload();
        window.showTeacherAuth = () => { document.getElementById('screen-login').classList.add('hidden'); document.getElementById('screen-teacher-auth').classList.remove('hidden'); document.getElementById('screen-teacher-auth').classList.add('flex'); };
        window.backToStudentLogin = () => location.reload();
        window.checkTeacherCode = () => { if (document.getElementById('secret-code').value === SECRET_CODE) { document.getElementById('screen-teacher-auth').classList.add('hidden'); document.getElementById('screen-dashboard').classList.remove('hidden'); document.getElementById('screen-dashboard').classList.add('flex'); initDashboard(); } else { alert("Sai mã!"); } };

        const initDashboard = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), (snap) => {
                const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                data.sort((a,b) => (b.thoiGianNop?.toMillis()||0)-(a.thoiGianNop?.toMillis()||0));
                const tbody = document.getElementById("table-body"); tbody.innerHTML = "";
                data.forEach(item => {
                    const tr = document.createElement("tr"); tr.className = "bg-white border-b hover:bg-blue-50 transition-colors";
                    tr.innerHTML = `<td class="p-5 text-[8px] text-slate-300 font-bold uppercase">${item.thoiGianNop?new Date(item.thoiGianNop.toMillis()).toLocaleString('vi-VN'):'--'}</td><td class="p-5 font-black text-slate-700">${item.sbd}</td><td class="p-5 font-black text-blue-900 uppercase">${item.hoTen}</td><td class="p-5 text-center font-black text-2xl text-blue-600">${item.diemTong}</td><td class="p-5 text-center"><button onclick="window.delRec('${item.id}')" class="text-red-400 hover:scale-125 transition-transform"><i class="fas fa-trash-alt"></i></button></td>`;
                    tbody.appendChild(tr);
                });
            });
        };

        window.delRec = async (id) => { if(confirm("Xác nhận xóa kết quả?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, id)); };
        window.exportCSV = () => {
            let csv = "\uFEFFThời gian,SBD,Họ tên,Tổng điểm\n";
            Array.from(document.getElementById('table-body').rows).forEach(row => { csv += Array.from(row.cells).slice(0,4).map(c=>`"${c.innerText}"`).join(",") + "\n"; });
            const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8," + csv); link.download = "Diem_ThauKinh.csv"; link.click();
        };
    </script>
</body>
</html>
